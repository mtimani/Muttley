version: "3.8"

services:
  muttley:
    image: mtimani/muttley
    container_name: muttley
    restart: always
    ports:
      - "80:5000"
    environment:
      - FLASK_ENV=production
      # Not required => Use only if BasicAuth needed
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=supersecurepassword
    volumes:
      - ./data:/data
    entrypoint: ["/bin/bash", "/server/run.sh"]
